<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanshin Telemetry</title>
    <!-- Assuming your style.css is set up, but adding local styles for the demo -->
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: monospace;
        }
        #telemetry-output {
            font-size: 1.5rem;
            padding: 20px;
            border: 1px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Sensory Awareness: Active</h1>
    <p>Tracking spatial telemetry in real-time...</p>
    <div id="telemetry-output">X: 0 | Y: 0</div>

    <script>
        // Script to track continuous spatial awareness across the document
        document.addEventListener('mousemove', (event) => {
            const output = document.getElementById('telemetry-output');
            output.textContent = `X: ${event.clientX} | Y: ${event.clientY}`;
        });
    </script>
</body>
</html>
